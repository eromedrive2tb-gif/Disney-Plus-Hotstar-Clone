<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ------------------ Favicon ------------------ -->
    <link rel="shortcut icon" href="./assets/img/favicon.ico" type="image/x-icon">

    <!-- ------------------ Title ------------------ -->
    <title>Disney+ Hotstar - Watch TV Shows Online</title>

    <!-- ------------------ Style Sheet ------------------ -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- ------------------ HTMX ------------------ -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body>
    <!-- ------------------ Navbar ------------------ -->
    <nav class="navbar">
        <img src="./assets/img/logo (1).svg" class="logo" alt="Logo">
        <ul class="nav-links">
            <li class="nav-items"><a href="#">TV</a></li>
            <li class="nav-items"><a href="#">Movies</a></li>
            <li class="nav-items"><a href="#">Sports</a></li>
            <li class="nav-items"><a href="#">Premium</a></li>
            <li class="nav-items"><a href="#">Disney+</a></li>
            <li class="icon"><a href="#"></a></li>
        </ul>

        <div class="right-container">
            <input type="text" class="search-box" placeholder="search">
            <button class="sub-btn">Subscribe</button>
            <a href="#" class="login-link">login</a>
        </div>
    </nav>

    <!-- ------------------ Carousel ------------------ -->
    <div class="carousel-container">
        <div class="carousel" 
             hx-get="/api/carousel/next?current=0" 
             hx-trigger="load, every 5s" 
             hx-swap="innerHTML">
            <!-- O primeiro slide será carregado aqui via HTMX -->
            <div class="slider">
                <div class="slide-content">
                    <h1 class="movie-title">Loading...</h1>
                </div>
            </div>
        </div>
    </div>

    <!-- ------------------ Video Card ------------------ -->
    <div class="video-card-container">
        <div class="video-card" 
             hx-get="/api/video/play?id=disney" 
             hx-trigger="mouseenter" 
             hx-swap="innerHTML">
            <img src="./assets/img/disney.png" class="video-card-image" alt="">
            <video src="./assets/video/disney.mp4" mute loop class="card-video"></video>
        </div>
        <div class="video-card" 
             hx-get="/api/video/play?id=pixar" 
             hx-trigger="mouseenter" 
             hx-swap="innerHTML">
            <img src="./assets/img/pixar.png" class="video-card-image" alt="">
            <video src="./assets/video/pixar.mp4" mute loop class="card-video"></video>
        </div>
        <div class="video-card" 
             hx-get="/api/video/play?id=marvel" 
             hx-trigger="mouseenter" 
             hx-swap="innerHTML">
            <img src="./assets/img/marvel.png" class="video-card-image" alt="">
            <video src="./assets/video/marvel.mp4" mute loop class="card-video"></video>
        </div>
        <div class="video-card" 
             hx-get="/api/video/play?id=star-wars" 
             hx-trigger="mouseenter" 
             hx-swap="innerHTML">
            <img src="./assets/img/star-wars.png" class="video-card-image" alt="">
            <video src="./assets/video/star-war.mp4" mute loop class="card-video"></video>
        </div>
        <div class="video-card" 
             hx-get="/api/video/play?id=geographic" 
             hx-trigger="mouseenter" 
             hx-swap="innerHTML">
            <img src="./assets/img/geographic.png" class="video-card-image" alt="">
            <video src="./assets/video/geographic.mp4" mute loop class="card-video"></video>
        </div>
    </div>

    <!-- ------------------ Recommendation ------------------ -->
    <h1 class="title">recommended for you</h1>
    <div class="movies-list">
        <button class="pre-btn" 
                hx-get="/api/movies?category=recommended&page=1" 
                hx-target="#recommended-container" 
                hx-swap="innerHTML"><img src="./assets/img/pre.png" alt=""></button>
        <button class="nxt-btn" 
                hx-get="/api/movies?category=recommended&page=2" 
                hx-target="#recommended-container" 
                hx-swap="innerHTML"><img src="./assets/img/nxt.png" alt=""></button>
        <div class="card-container" id="recommended-container" 
             hx-get="/api/movies?category=recommended&page=1" 
             hx-trigger="load" 
             hx-swap="innerHTML">
            <!-- Cards serão injetados pelo Mock API via TMDB -->
            <div class="card"><div class="card-body"><h2 class="name">Loading...</h2></div></div>
        </div>
    </div>

    <!-- ------------------ Papular Shows ------------------ -->
    <h1 class="title">Popular Shows</h1>
    <div class="movies-list">
        <button class="pre-btn" 
                hx-get="/api/movies?category=popular&page=1" 
                hx-target="#popular-container" 
                hx-swap="innerHTML"><img src="./assets/img/pre.png" alt=""></button>
        <button class="nxt-btn" 
                hx-get="/api/movies?category=popular&page=2" 
                hx-target="#popular-container" 
                hx-swap="innerHTML"><img src="./assets/img/nxt.png" alt=""></button>
        <div class="card-container" id="popular-container"
             hx-get="/api/movies?category=popular&page=1" 
             hx-trigger="load" 
             hx-swap="innerHTML">
            <div class="card"><div class="card-body"><h2 class="name">Loading...</h2></div></div>
        </div>
    </div>

    <!-- ------------------ New Releases ------------------ -->
    <h1 class="title">New Releases</h1>
    <div class="movies-list">
        <button class="pre-btn" 
                hx-get="/api/movies?category=new&page=1" 
                hx-target="#new-container" 
                hx-swap="innerHTML"><img src="./assets/img/pre.png" alt=""></button>
        <button class="nxt-btn" 
                hx-get="/api/movies?category=new&page=2" 
                hx-target="#new-container" 
                hx-swap="innerHTML"><img src="./assets/img/nxt.png" alt=""></button>
        <div class="card-container" id="new-container"
             hx-get="/api/movies?category=new&page=1" 
             hx-trigger="load" 
             hx-swap="innerHTML">
            <div class="card"><div class="card-body"><h2 class="name">Loading...</h2></div></div>
        </div>
    </div>

    <!-- ------------------ JavaScript (HTMX handles logic now) ------------------ -->
    <script>
        // Simulador de Backend (Mock API) para HTMX
        // Intercepta chamadas /api/ e injeta HTML usando o motor do HTMX
        
        document.body.addEventListener('htmx:beforeRequest', async (event) => {
            const path = event.detail.pathInfo.requestPath;
            
            if (path.startsWith('/api/')) {
                // Impede a requisição real de ir para o servidor Python (que daria 404)
                event.preventDefault(); 
                
                const target = event.detail.target;
                let html = '';

                try {
                    // Lógica do Hero Banner
                    if (path.includes('/api/carousel/next')) {
                        const url = new URL(path, window.location.origin);
                        const current = parseInt(url.searchParams.get('current')) || 0;
                        
                        const res = await fetch('./assets/data/movies.json');
                        const movies = await res.json();
                        const nextIndex = (current + 1) % movies.length;
                        const movie = movies[nextIndex];

                        html = `
                            <div class="slider" hx-get="/api/carousel/next?current=${nextIndex}" hx-trigger="every 5s" hx-swap="innerHTML">
                                <div class="slide-content">
                                    <h1 class="movie-title">${movie.name}</h1>
                                    <p class="movie-des">${movie.des}</p>
                                </div>
                                <img src="${movie.image}" alt="Slider">
                            </div>
                        `;
                    }

                    // Lógica do Catálogo TMDB
                    if (path.includes('/api/movies')) {
                        const url = new URL(path, window.location.origin);
                        const category = url.searchParams.get('category');
                        const page = url.searchParams.get('page') || 1;
                        
                        const tmdbMap = {
                            'recommended': 'movie/top_rated',
                            'popular': 'tv/popular',
                            'new': 'movie/now_playing'
                        };

                        const tmdbPath = tmdbMap[category] || 'movie/popular';
                        const tmdbRes = await fetch(`https://api.themoviedb.org/3/${tmdbPath}?api_key=3a40d638587b1bc64ed4da395b26fbcb&page=${page}&language=pt-BR`);
                        const data = await tmdbRes.json();

                        html = data.results.map(movie => `
                            <div class="card">
                                <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" class="card-img" alt="${movie.title || movie.name}">
                                <div class="card-body">
                                    <h2 class="name">${movie.title || movie.name}</h2>
                                    <h6 class="des">${movie.overview ? movie.overview.substring(0, 50) + '...' : 'Sem descrição disponível.'}</h6>
                                    <button class="watchlist-btn">add to watchlist</button>
                                </div>
                            </div>
                        `).join('');
                    }

                    // Injeta o HTML no alvo e diz ao HTMX para processar novos atributos hx-*
                    if (html) {
                        target.innerHTML = html;
                        htmx.process(target);
                    }

                } catch (error) {
                    console.error("Erro no Simulador API:", error);
                }
            }
        });

        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['Authorization'] = 'Bearer eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIzYTQwZDYzODU4N2IxYmM2NGVkNGRhMzk1YjI2ZmJjYiIsIm5iZiI6MTc3OTAzMjI2OS44NTYsInN1YiI6IjZhMDllMGNkYTBlMzQ0ZDg4ZWRiMmRmNyIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.IQvGBVdOwVHYKB4V5QXRCzAb233nPnYe5OOeC-w9xFs';
        });
    </script>
</body>

</html>
